server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8
  # 优雅停机配置
  shutdown: graceful

spring:
  application:
    name: self_schedule
  http:
    encoding:
      enabled: true
      charset: UTF-8
      force: true
  
  # 数据库配置
  datasource:
    url: jdbc:mysql://127.0.0.1:4401/self_schedule?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 连接池配置（HikariCP）
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: SelfScheduleHikariCP
  
  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6380
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 10000ms

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      adjust-dates-to-context-time-zone: false

  # 邮件配置（QQ邮箱示例）
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.connectiontimeout: 10000
      mail.smtp.timeout: 10000

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.cjl.self_schedule.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      table-underline: true
    banner: false

# AI配置（API Key由用户在个人信息中配置）
ai:
  zhipu:
    api-url: https://open.bigmodel.cn/api/paas/v4/chat/completions
    base-url: https://open.bigmodel.cn/api/paas

# JWT配置
jwt:
  secret-key: ${JWT_SECRET_KEY}
  expiration-time: ${JWT_EXPIRATION_TIME:86400000}

# AES加密密钥（用于加密存储用户的API Key和Webhook URL）
encryption:
  secret-key: ${AES_SECRET_KEY}

# 提醒配置
reminder:
  cleanup-enabled: true

# 数据清理配置
app:
  cleanup:
    enabled: true
    archived-task-days: 30
    cancelled-task-days: 15
    closed-feedback-days: 60
    read-feedback-days: 90
    focus-record-days: 90
    read-message-days: 90
    closed-appeal-days: 60

# 调试模式（生产环境改为false）
debug: ${DEBUG_MODE:true}

# CORS配置（生产环境应替换为实际前端域名）
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# 微信小程序配置
wechat:
  appid: ${WECHAT_APPID:}
  secret: ${WECHAT_SECRET:}

# 日志配置
logging:
  level:
    root: INFO
    com.cjl.self_schedule: DEBUG
    com.cjl.self_schedule.ai.service.impl.AiTaskServiceImpl: DEBUG
    com.cjl.self_schedule.common.filter: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  charset:
    console: UTF-8
    file: UTF-8